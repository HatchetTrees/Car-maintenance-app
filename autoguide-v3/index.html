<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoGuide — Car Maintenance Hub</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>AutoGuide</h1>
      <p>Car Maintenance Hub</p>
    </div>

    <nav class="sidebar-nav">

      <div class="nav-label">My Garage</div>

      <div class="nav-item" data-view="mycar">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24"><path d="M5 17H3a2 2 0 01-2-2V9a2 2 0 012-2h1l3-4h8l3 4h1a2 2 0 012 2v6a2 2 0 01-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/></svg>
        </div>
        <span class="nav-text">My vehicle</span>
      </div>

      <div class="nav-item" data-view="records">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <span class="nav-text">Records & bills</span>
      </div>

      <div class="nav-label">Maintenance</div>

      <div class="nav-item active" data-view="all">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </div>
        <span class="nav-text">All topics</span>
        <span class="nav-badge">12</span>
      </div>

      <div class="nav-item" data-view="fluids">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 2C12 2 5 10 5 15a7 7 0 0014 0C19 10 12 2 12 2z"/></svg></div>
        <span class="nav-text">Fluids</span>
      </div>

      <div class="nav-item" data-view="tires">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="3" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="21"/><line x1="3" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="21" y2="12"/></svg></div>
        <span class="nav-text">Tires & Wheels</span>
      </div>

      <div class="nav-item" data-view="electrical">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
        <span class="nav-text">Electrical</span>
      </div>

      <div class="nav-item" data-view="engine">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="10" rx="2"/><path d="M6 7V5M10 7V5M14 7V5M18 7V5M6 17v2M18 17v2"/></svg></div>
        <span class="nav-text">Engine</span>
      </div>

      <div class="nav-item" data-view="lights">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/></svg></div>
        <span class="nav-text">Lights</span>
      </div>

      <div class="nav-item" data-view="safety">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/></svg></div>
        <span class="nav-text">Safety & Roadside</span>
      </div>

      <div class="nav-item" data-view="filters">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M22 3H2l8 9.46V19l4 2V12.46L22 3z"/></svg></div>
        <span class="nav-text">Filters & Air</span>
      </div>

    </nav>
  </aside>

  <!-- ── Main ── -->
  <main class="main">
    <div class="topbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search topics, e.g. 'oil change', 'flat tire', 'battery'..." />
      </div>
      <button class="tbtn" onclick="clearSearch()">Clear</button>
    </div>
    <div class="content" id="content"></div>
  </main>

</div>

<script src="data/topics.js"></script>
<script src="js/icons.js"></script>
<script src="js/app.js"></script>
</body>
</html>
